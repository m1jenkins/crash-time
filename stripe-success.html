<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/google-ads.js?v=20260718"></script>
  <script src="js/google-ads-events.js?v=20260720b"></script>
  <script src="js/stripe-success.js?v=20260720"></script>
  <title>Payment Confirmed | Spur Auto</title>
  <meta name="description" content="Your confirmed Spur Auto payment details.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.spurauto.com/stripe-success.html">
  <link rel="stylesheet" href="css/styles.css?v=20260718a">
  <link rel="icon" href="assets/brand/spur-auto-favicon.ico" sizes="any">
</head>
<body class="site-redesign">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="site-header">
    <nav class="container nav" aria-label="Primary">
      <a href="/" class="logo"><img class="logo-image" src="assets/brand/concepts/spur-auto-concept-logo-dark.png" alt="Spur Auto"></a>
    </nav>
  </header>
  <main class="section review-form-section" id="main-content" tabindex="-1">
    <div class="container">
      <section class="form-card thank-you-card" aria-labelledby="purchase-title">
        <h1 id="purchase-title">Confirming your payment…</h1>
        <p id="purchase-message" aria-live="polite">We’re securely checking the transaction with Stripe.</p>
        <dl id="purchase-details">
          <div><dt>Order ID</dt><dd id="purchase-order-id">—</dd></div>
          <div><dt>Amount</dt><dd id="purchase-amount">—</dd></div>
          <div><dt>Status</dt><dd id="purchase-status">—</dd></div>
        </dl>
        <p class="thank-you-note">We’ll use the email supplied at checkout to follow up about your appraisal.</p>
        <a href="/" class="btn btn-primary">Back to Spur Auto</a>
      </section>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container"><div class="footer-disclaimer"><p>© 2026 Spur Auto. All rights reserved.</p></div></div>
  </footer>
</body>
</html>
